<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>카바디</title>
  <script type="module" crossorigin src="/assets/index-Cut5yKV6.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DNcu0X3e.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Intro -->
<div id="intro">
  <div id="gameTitle">CABADI</div>
  <div id="gameSub">RAINFOREST SURVIVOR</div>
  <button id="startBtn">START GAME</button>
  <button id="introShopBtn">🐾 카피바라 업그레이드</button>
  <button id="introAdBuffBtn" style="background: rgba(255,204,51,0.15); border: 1.5px solid #ffcc33; color: #ffcc33; margin-top: 12px; padding: 12px 30px; border-radius: 30px; font-weight: 700; font-size: 13px; cursor: pointer;">📺 광고 보고 버프 시작 (공격력+30%)</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="waveLabel">WAVE <span id="waveNum">1</span></div>
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="hudRight">
    <div id="hudBananas">🍌 0</div>
    <button id="hudMissionsBtn">📋</button>
    <button id="soundBtn">🔊</button>
  </div>
</div>

<!-- Wave Upgrade Screen -->
<div id="upgradeScreen">
  <div id="upgradeTitle">강화 선택</div>
  <div id="upgradeCards"></div>
</div>

<!-- Game Over -->
<div id="gameOver">
  <div id="goLabel">GAME OVER</div>
  <div id="goScore">0</div>
  <div id="goUnit">WAVES SURVIVED</div>
  <div id="goBest">최고 기록 0 WAVES</div>
  <div id="goBananaEarned">+0 🍌 획득</div>
  <button class="goBtn revive" id="reviveBtn">📺 광고 보고 부활</button>
  <button class="goBtn primary" id="doubleBananaBtn" style="background: #ffcc33; display: none;">📺 광고 보고 보상 2배</button>
  <button class="goBtn primary" id="retryBtn">다시 도전</button>
  <button class="goBtn secondary" id="goShopBtn">🐾 업그레이드</button>
  <button class="goBtn secondary" id="goMissionsBtn">📋 일일 미션</button>
  <button class="goBtn secondary" id="leaderboardBtn">리더보드</button>
</div>

<!-- Capybara Shop -->
<div id="shopScreen">
  <div id="shopHeader">
    <button id="shopCloseBtn">←</button>
    <div id="shopTitle">카피바라 업그레이드</div>
    <div id="shopBalance">🍌 <span id="shopBananaCount">0</span></div>
  </div>
  <div id="shopItems"></div>
</div>

<!-- Wave Announce -->
<div id="waveAnnounce"></div>

<!-- Base Flash -->
<div id="baseFlash"></div>

<!-- Daily Missions -->
<div id="missionsScreen">
  <div id="missionsHeader">
    <button id="missionsCloseBtn">←</button>
    <div id="missionsTitle">일일 미션</div>
    <div id="missionsBalance">🍌 <span id="missionsBananaCount">0</span></div>
  </div>
  <div id="missionsItems"></div>
</div>

<!-- Ad Fallback (AIT/AdMob 미지원 환경) -->
<div id="adScreen">
  <div id="adTag">ADVERTISEMENT</div>
  <div id="adBox"><div id="adCount">5</div></div>
</div>

<!-- Close confirmation -->
<div id="closeConfirm">
  <div id="closeBox">
    <div id="closeMsg">게임을 종료할까요?</div>
    <div class="closeBtns">
      <button id="closeNo">계속하기</button>
      <button id="closeYes">종료</button>
    </div>
  </div>
</div>

</body>
</html>
