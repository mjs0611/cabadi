<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>카바디</title>
  <script type="module" crossorigin src="/assets/index-14Jxfg9o.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CnzDf918.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- Intro -->
<div id="intro">
  <div class="intro-hero">
    <img src="/assets/images/intro_hero.png" alt="Cabadi Hero">
  </div>
  <div id="gameTitle">카바디</div>
  <div id="gameSub">카피바라 디펜스</div>
  <button id="startBtn" class="pulse-btn">TAP TO START</button>
</div>

<!-- Persistent Bars (Lobby Only) -->
<div id="topBar" class="hidden">
  <div class="top-player">
    <div class="top-avatar">🐾</div>
    <div class="top-name-box">
      <div class="top-name">CAPY SURVIVOR</div>
      <div class="top-level">Lv.1</div>
    </div>
  </div>
  <div class="top-stats">
    <div class="top-stat-item"><span class="icon icon-gold"></span> <span id="lobbyBananaCountTop">0</span></div>
    <div class="top-stat-item"><span class="icon icon-trophy">🏆</span> <span id="lobbyBestWaveTop">1</span></div>
  </div>
</div>

<nav id="bottomNav" class="hidden">
  <button class="nav-btn" data-tab="shop">
    <div class="nav-icon"><span class="icon icon-shop">🛒</span></div>
    <div class="nav-label">상점</div>
  </button>
  <button class="nav-btn" data-tab="missions">
    <div class="nav-icon"><span class="icon icon-missions">📋</span></div>
    <div class="nav-label">미션</div>
  </button>
  <button class="nav-btn active" data-tab="home">
    <div class="nav-icon"><span class="icon icon-home">🏠</span></div>
    <div class="nav-label">홈</div>
  </button>
  <button class="nav-btn" data-tab="upgrades">
    <div class="nav-icon"><span class="icon icon-upgrades">📈</span></div>
    <div class="nav-label">강화</div>
  </button>
  <button class="nav-btn" data-tab="skills">
    <div class="nav-icon"><span class="icon icon-skills">🌱</span></div>
    <div class="nav-label">스킬</div>
  </button>
</nav>

<!-- Tab Screens -->
<div id="lobbyTabs" class="hidden">
  <div id="lobbyFirelight"></div>
  <div id="lobbyParticles"></div>
  <!-- Home Tab -->
  <div id="tab-home" class="tab-content active">
    <div class="lobby-center-v3">
      <div id="lobbyCapybaraHero">
        <img src="/assets/images/sprites/hero_capybara_v8.png" alt="Hero Capy">
      </div>
      <div class="lobby-welcome">반가워요, 생존자님!</div>
      <button id="lobbyAdBuffBtn" class="buff-btn-v3">📺 공격력 버프 (+30%)</button>
      <button id="lobbyBattleBtn" class="battle-btn-v3">전투 개시</button>
    </div>
  </div>

  <!-- Shop Tab (Moved from overlay) -->
  <div id="tab-shop" class="tab-content">
    <div class="tab-header">카바디 상점</div>
    <div id="shopItems" class="grid-list"></div>
  </div>

  <!-- Missions Tab (Moved from overlay) -->
  <div id="tab-missions" class="tab-content">
    <div class="tab-header">일일 미션</div>
    <div id="missionsItems" class="grid-list"></div>
  </div>

  <!-- Upgrades Tab (Was Shop renamed to Upgrades/Enhance) -->
  <div id="tab-upgrades" class="tab-content">
    <div class="tab-header">능력 강화</div>
    <div id="upgradesItems" class="grid-list"></div>
  </div>

  <!-- Skills Tab (Moved from overlay) -->
  <div id="tab-skills" class="tab-content">
    <div class="tab-header">스킬 도감</div>
    <div id="skillSettingList" class="grid-list"></div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="waveLabel">WAVE <span id="waveNum">1</span></div>
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="waveProgress"><div id="waveProgressFill"></div></div>
  <div id="bossBar" class="hidden">
    <div class="boss-label">BOSS INCOMING</div>
    <div class="boss-hp-bg"><div id="bossHpFill"></div></div>
  </div>
  <div id="skillSlots"></div>
  <div id="hudRight">
    <div id="hudBananas"><span class="icon icon-gold"></span> 0</div>
    <button id="hudMissionsBtn"><span class="icon icon-missions">📋</span></button>
    <button id="soundBtn"><span class="icon icon-sound">🔊</span></button>
  </div>
</div>

<!-- Wave Announce -->
<div id="waveAnnounce"></div>

<!-- Base Flash -->
<div id="baseFlash"></div>

<!-- Level Up Splash -->
<div id="levelUpSplash" class="hidden">
  <div class="lvl-up-content">
    <div class="lvl-up-title">SKILL UPGRADE!</div>
    <div id="lvlUpSkillName">ACORN CANNON</div>
    <div class="lvl-up-stars">⭐⭐⭐</div>
  </div>
</div>

<!-- Wave Upgrade Screen -->
<div id="upgradeScreen">
  <div id="upgradeTitle">강화 선택</div>
  <div id="upgradeCards"></div>
</div>

<!-- Game Over -->
<div id="gameOver">
  <div id="goLabel">GAME OVER</div>
  
  <div class="go-results-grid">
    <div class="res-card">
      <span class="res-label">SURVIVED</span>
      <span id="goScore" class="res-val">0</span>
      <span class="res-unit">WAVES</span>
    </div>
    <div class="res-card">
      <span class="res-label">EARNED</span>
      <span id="goBananaEarned" class="res-val">+0</span>
      <span class="res-unit">BANANAS</span>
    </div>
  </div>

  <div id="goBest" class="go-record">최고 기록 0 WAVES</div>

  <div class="go-actions-grid">
    <button class="go-btn-v2 ad" id="reviveBtn">📺 부활</button>
    <button class="go-btn-v2 ad" id="doubleBananaBtn">📺 보상 2배</button>
    <button class="go-btn-v2 primary" id="retryBtn">다시 시작</button>
    <button class="go-btn-v2 secondary" id="goLobbyBtn">로비로</button>
  </div>
</div>



<!-- Ad Fallback (AIT/AdMob 미지원 환경) -->
<div id="adScreen">
  <div id="adTag">ADVERTISEMENT</div>
  <div id="adBox"><div id="adCount">5</div></div>
</div>

<!-- Close confirmation -->
<div id="closeConfirm">
  <div id="closeBox">
    <div id="closeMsg">게임을 종료할까요?</div>
    <div class="closeBtns">
      <button id="closeNo">계속하기</button>
      <button id="closeYes">종료</button>
    </div>
  </div>
</div>

</body>
</html>
